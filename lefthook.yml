pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: typecheck
      glob: "*.{ts,tsx}"
      run: bunx tsc --noEmit
    - name: vitest-related
      glob: "*.{ts,tsx}"
      run: bunx vitest related --run {staged_files}

prepare-commit-msg:
  jobs:
    - name: cz-on-empty
      interactive: true
      run: |
        source="{2}"
        # Chỉ intercept khi user dùng -m (source=message); bỏ qua merge/squash/template/rebase
        if [ "$source" != "message" ]; then
          exit 0
        fi
        # Check message rỗng (sau khi strip comments + blank lines)
        msg=$(grep -v '^#' "{1}" | sed '/^[[:space:]]*$/d' | head -c 1)
        if [ -n "$msg" ]; then
          exit 0
        fi
        # Cần TTY (skip nếu chạy từ GUI client / CI)
        if [ ! -e /dev/tty ]; then
          echo "✗ Empty commit message and no TTY available. Use 'bun cz' instead."
          exit 1
        fi
        # Launch czg trực tiếp trong hook mode để ghi message vào file {1}
        exec < /dev/tty && GIT_PARAMS="{1}" bunx czg --hook || exit 1

commit-msg:
  jobs:
    - name: commitlint
      run: |
        msg=$(grep -v '^#' {1} | sed '/^[[:space:]]*$/d' | head -c 1)
        if [ -z "$msg" ]; then
          echo "✗ Commit message rỗng. Format: <type>(<scope>): <subject>"
          echo "  Tip: gõ 'git commit -m \"\"' để mở UI czg, hoặc 'bun cz'."
          exit 1
        fi
        bunx commitlint --edit {1}

pre-push:
  parallel: false
  jobs:
    - name: branch-name
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ] || [ "$branch" = "dev" ] || [ "$branch" = "develop" ]; then
          exit 0
        fi
        if ! echo "$branch" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)/[a-z0-9._-]+$'; then
          echo "✗ Branch '$branch' invalid."
          echo "  Format: <type>/<short-desc>  e.g. feat/dark-theme, fix/login-bug"
          echo "  Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          exit 1
        fi
    - name: test
      run: bunx vitest run
    - name: build
      run: bun run build
