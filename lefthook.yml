pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: typecheck
      glob: "*.{ts,tsx}"
      run: bunx tsc --noEmit
    - name: vitest-related
      glob: "*.{ts,tsx}"
      run: bunx vitest related --run {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: bunx commitlint --edit {1}

pre-push:
  parallel: false
  jobs:
    - name: branch-name
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ] || [ "$branch" = "dev" ] || [ "$branch" = "develop" ]; then
          exit 0
        fi
        if ! echo "$branch" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)/[a-z0-9._-]+$'; then
          echo "✗ Branch '$branch' invalid."
          echo "  Format: <type>/<short-desc>  e.g. feat/dark-theme, fix/login-bug"
          echo "  Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          exit 1
        fi
    - name: test
      run: bunx vitest run
    - name: build
      run: bun run build
